# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

# ============================================================================
# ADVISORIES — known security vulnerabilities in dependencies
# ============================================================================
[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Add specific RUSTSEC ignores here only with a justification comment.
ignore = [
  # `paste` is archived/unmaintained (no fix available). It's a transitive
  # build-time proc-macro dep pulled in via Slint; no known vulnerability,
  # only the unmaintained advisory. Revisit if Slint drops it.
  "RUSTSEC-2024-0436",
]

# ============================================================================
# LICENSES — dependency licenses checked against an allowlist
# ============================================================================
[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "MPL-2.0",
  "OpenSSL",
  "Unicode-3.0",
  "CC0-1.0",
  "BSL-1.0",
  "CDLA-Permissive-2.0",
  "Unlicense",
  # NCSA (University of Illinois/NCSA Open Source) — OSI-approved, FSF Free/Libre,
  # permissive and GPL-compatible. Pulled in (build-time) via Slint 1.17's compiler
  # → image → ravif → rav1e → libfuzzer-sys.
  "NCSA",
  # This app is licensed GPL-3.0-only (see LICENSE), which is also the license we
  # elect for Slint (tri-licensed GPL-3.0 / Royalty-Free / paid Software).
  "GPL-3.0-only",
]
confidence-threshold = 0.8

# Ring uses a custom license that's permissive (likely pulled in via rustls).
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ============================================================================
# BANS — deny or allow specific crates or versions
# ============================================================================
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
deny = []
skip = []
skip-tree = []

# ============================================================================
# SOURCES — controls where crates can be sourced from
# ============================================================================
[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
