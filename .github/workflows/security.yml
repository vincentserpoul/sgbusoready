---
# Security CI Pipeline
# Runs security checks on every PR and weekly on main.

name: Security

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUST_TOOLCHAIN: 1.96.0

jobs:
  # ============================================================================
  # DEPENDENCY AUDIT
  # ============================================================================
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Rust
        run: |
          rustup toolchain install "${{ env.RUST_TOOLCHAIN }}" --profile minimal
          rustup default "${{ env.RUST_TOOLCHAIN }}"

      - name: Install cargo-audit
        uses: taiki-e/install-action@7a562dfa955aa2e4d5b0fd6ebd57ff9715c07b0b # v2.73.0
        with:
          tool: cargo-audit

      - name: Run cargo audit
        run: cargo audit

  # ============================================================================
  # CARGO DENY (Licenses, Bans, Advisories, Sources)
  # ============================================================================
  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Rust
        run: |
          rustup toolchain install "${{ env.RUST_TOOLCHAIN }}" --profile minimal
          rustup default "${{ env.RUST_TOOLCHAIN }}"

      - name: Install cargo-deny
        uses: taiki-e/install-action@7a562dfa955aa2e4d5b0fd6ebd57ff9715c07b0b # v2.73.0
        with:
          tool: cargo-deny

      - name: Check advisories
        run: cargo deny check advisories

      - name: Check licenses
        run: cargo deny check licenses

      - name: Check bans
        run: cargo deny check bans

      - name: Check sources
        run: cargo deny check sources

  # ============================================================================
  # UNSAFE CODE AUDIT
  # Especially relevant here: the iOS/Android FFI bridges are the only place
  # `unsafe` is allowed. geiger keeps that surface visible.
  # ============================================================================
  geiger:
    name: Unsafe Code Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Rust
        run: |
          rustup toolchain install "${{ env.RUST_TOOLCHAIN }}" --profile minimal
          rustup default "${{ env.RUST_TOOLCHAIN }}"

      - name: Install cargo-geiger
        uses: taiki-e/install-action@7a562dfa955aa2e4d5b0fd6ebd57ff9715c07b0b # v2.73.0
        with:
          tool: cargo-geiger

      - name: Run cargo geiger
        run: cargo geiger --all-features --all-targets
        continue-on-error: true  # Report, don't fail the build

  # ============================================================================
  # SECRET DETECTION
  # ============================================================================
  secrets:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0  # Full history for scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # OUTDATED DEPENDENCIES (informational)
  # ============================================================================
  outdated:
    name: Check Outdated Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Rust
        run: |
          rustup toolchain install "${{ env.RUST_TOOLCHAIN }}" --profile minimal
          rustup default "${{ env.RUST_TOOLCHAIN }}"

      - name: Install cargo-outdated
        uses: taiki-e/install-action@7a562dfa955aa2e4d5b0fd6ebd57ff9715c07b0b # v2.73.0
        with:
          tool: cargo-outdated

      - name: Check outdated
        run: cargo outdated --root-deps-only
        continue-on-error: true  # Informational only

  # ============================================================================
  # FILESYSTEM / CONFIG VULNERABILITY SCAN
  # ============================================================================
  trivy-security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Run Trivy vulnerability scanner (filesystem)
        # yamllint disable-line rule:line-length
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          format: 'table'

      - name: Run Trivy vulnerability scanner (config)
        # yamllint disable-line rule:line-length
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: 'config'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'table'
