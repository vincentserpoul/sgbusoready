---
# CI Pipeline
# Runs build, lint and tests on every PR and push to main.

name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: 1.96.0
  RUSTFLAGS: -D warnings

jobs:
  # ============================================================================
  # FORMAT CHECK
  # ============================================================================
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Rust
        run: |
          rustup toolchain install "${{ env.RUST_TOOLCHAIN }}" \
            --profile minimal \
            --component rustfmt
          rustup default "${{ env.RUST_TOOLCHAIN }}"

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ============================================================================
  # CLIPPY LINT
  # ============================================================================
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Rust
        run: |
          rustup toolchain install "${{ env.RUST_TOOLCHAIN }}" \
            --profile minimal \
            --component clippy
          rustup default "${{ env.RUST_TOOLCHAIN }}"

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Run Clippy
        run: |
          cargo clippy --workspace --all-targets --all-features -- \
            -D warnings \
            -D clippy::unwrap_used \
            -D clippy::expect_used \
            -D clippy::panic \
            -D clippy::todo \
            -D clippy::unimplemented \
            -W clippy::cognitive_complexity

  # ============================================================================
  # DEPENDENCY CHECKS
  # ============================================================================
  deps:
    name: Dependency Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Rust
        run: |
          rustup toolchain install "${{ env.RUST_TOOLCHAIN }}" --profile minimal
          rustup default "${{ env.RUST_TOOLCHAIN }}"

      - name: Install cargo-deny
        uses: taiki-e/install-action@7a562dfa955aa2e4d5b0fd6ebd57ff9715c07b0b # v2.73.0
        with:
          tool: cargo-deny

      - name: Install cargo-machete
        uses: taiki-e/install-action@7a562dfa955aa2e4d5b0fd6ebd57ff9715c07b0b # v2.73.0
        with:
          tool: cargo-machete

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Check licenses and advisories
        run: cargo deny check

      - name: Check unused dependencies
        run: cargo machete

  # ============================================================================
  # BUILD & TEST (host platforms — the pure-Rust core + logic)
  # Mobile cross-builds (Android NDK / iOS Xcode) are wired in once the
  # ui/bridge crates land; see the design doc.
  # ============================================================================
  build:
    name: Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Rust
        run: |
          rustup toolchain install "${{ env.RUST_TOOLCHAIN }}" --profile minimal
          rustup default "${{ env.RUST_TOOLCHAIN }}"

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Build workspace
        run: cargo build --all-targets

      - name: Run tests
        run: cargo test --all-targets

  # ============================================================================
  # CODE COVERAGE
  # ============================================================================
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Rust
        run: |
          rustup toolchain install "${{ env.RUST_TOOLCHAIN }}" \
            --profile minimal \
            --component llvm-tools-preview
          rustup default "${{ env.RUST_TOOLCHAIN }}"

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@7a562dfa955aa2e4d5b0fd6ebd57ff9715c07b0b # v2.73.0
        with:
          tool: cargo-llvm-cov

      - name: Install cargo-nextest
        uses: taiki-e/install-action@7a562dfa955aa2e4d5b0fd6ebd57ff9715c07b0b # v2.73.0
        with:
          tool: cargo-nextest

      - name: Generate coverage report
        run: |
          mkdir -p coverage
          cargo llvm-cov nextest \
            --workspace \
            --codecov \
            --output-path coverage/codecov.json

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          files: coverage/codecov.json
          fail_ci_if_error: false
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

  # ============================================================================
  # DOCUMENTATION
  # ============================================================================
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install Rust
        run: |
          rustup toolchain install "${{ env.RUST_TOOLCHAIN }}" --profile minimal
          rustup default "${{ env.RUST_TOOLCHAIN }}"

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Build documentation
        run: cargo doc --workspace --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: -D warnings
